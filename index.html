<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMOTION JOURNEY</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- TOP MENU -->
<div class="topMenu">
  <div id="menuLeft"></div>
  <button onclick="openLogin()">Profile</button>
</div>

<!-- TITLE -->
<div class="centerTitle">
  <h1>EMOTION JOURNEY</h1>
</div>

<!-- DETAIL MODAL -->
<div class="modal" id="detailModal">
  <div class="modalCard" id="detailCard">
    <h2 id="dJudul"></h2>
    <p id="dTanggal"></p>
    <p id="dUser"></p>
    <p id="dKategori"></p>
    <p id="dIsi"></p>
    <div class="modalBtn">
      <button onclick="editNote()">Edit</button>
      <button onclick="deleteNote()">Hapus</button>
      <button onclick="closeDetail()">Tutup</button>
    </div>
  </div>
</div>

<!-- FORM MODAL -->
<div class="modal" id="formModal">
  <div class="formCard">
    <h3 id="formTitle">Tambah Catatan</h3>
    <input type="date" id="tanggal">
    <input type="text" id="judul" placeholder="Judul">
    <textarea id="isi" placeholder="Cerita hari ini"></textarea>
    
    <select id="level">
      <option value="1">Level 1 – Peaceful</option>
      <option value="2">Level 2 – Happy</option>
      <option value="3">Level 3 – Unsettled</option>
      <option value="4">Level 4 – Sad</option>
      <option value="5">Level 5 – Stressed</option>
      <option value="6">Level 6 – Breakdown</option>
    </select>

    <select id="kategori">
      <option>💖 Love</option>
      <option>👨‍👩‍👧 Family</option>
      <option>🌱 Self</option>
      <option>🌍 Life</option>
    </select>

    <button onclick="saveNote()">Simpan</button>
    <button onclick="closeForm()">Batal</button>
  </div>
</div>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
  <div class="formCard">
    <h3>Login</h3>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <select id="role">
      <option value="user">User</option>
      <option value="admin">Admin</option>
    </select>
    <button onclick="login()">Masuk</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
