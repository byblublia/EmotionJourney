<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peta Emosi Interaktif</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
body{
  margin:0;
  overflow:hidden;
  font-family:'Poppins',sans-serif;
  background:#f4f4f4;
}

/* Tombol pojok */
.top-buttons{
  position:fixed;
  top:15px;
  right:15px;
  z-index:10;
}

.top-buttons button{
  padding:8px 14px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  margin-left:5px;
  font-weight:600;
}

/* Bubble */
.bubble{
  position:absolute;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  color:white;
  padding:15px;
  box-sizing:border-box;
  font-size:11px;
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  line-height:1.2;
}

/* Modal */
.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:20;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:15px;
  width:320px;
  text-align:center;
  max-height:80vh;
  overflow:auto;
}

.progress{
  background:#eee;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:10px;
}

.progress-bar{
  height:20px;
  color:white;
  font-size:12px;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>
<body>

<div class="top-buttons">
  <button onclick="openAdd()">➕ Tambah</button>
  <button onclick="activateEdit()">✏ Edit</button>
  <button onclick="openStats()">📊 Statistik</button>
</div>

<div class="modal" id="modal">
  <div class="modal-content" id="modalContent"></div>
</div>

<script>

/* 🌊 DETAIL EMOSI */
const emotionLevels = {
  1:{warna:"#4cc9f0", nama:"Emosi Internal"},
  2:{warna:"#80ed99", nama:"Lelah & Stres"},
  3:{warna:"#f9c74f", nama:"Emosi Sosial"},
  4:{warna:"#f94144", nama:"Sangat Berat"}
};

const PASSWORD="deadline";
const EDIT_DEADLINE_DAYS=7;

let bubbles=[];
let selectedLevel=null;
let editMode=false;

/* Storage */
function loadNotes(){
  return JSON.parse(localStorage.getItem("notesArray")||"[]");
}

function saveNotes(arr){
  localStorage.setItem("notesArray",JSON.stringify(arr));
}

/* Tambah Catatan */
function openAdd(){
  selectedLevel=null;
  document.getElementById("modalContent").innerHTML=`
    <h3>Tambah Catatan</h3>
    <input id="judul" placeholder="Judul">
    <textarea id="isi" placeholder="Isi catatan"></textarea>
    <p>Pilih Level Emosi:</p>
    <div>
      <button onclick="setLevel(1)">1</button>
      <button onclick="setLevel(2)">2</button>
      <button onclick="setLevel(3)">3</button>
      <button onclick="setLevel(4)">4</button>
    </div>
    <button onclick="saveNew()">Simpan</button>
    <button onclick="closeModal()">Batal</button>
  `;
  document.getElementById("modal").style.display="flex";
}

function setLevel(level){
  selectedLevel=level;
  alert("Level dipilih: "+emotionLevels[level].nama);
}

function saveNew(){
  const judul=document.getElementById("judul").value;
  const isi=document.getElementById("isi").value;
  if(!judul||!isi||!selectedLevel) return alert("Lengkapi semua data");

  const arr=loadNotes();
  arr.push({
    id:Date.now(),
    judul,
    isi,
    level:selectedLevel,
    date:new Date().toLocaleDateString("id-ID"),
    timestamp:Date.now()
  });

  saveNotes(arr);
  closeModal();
  refreshBubbles();
}

/* Bubble */
function createBubble(note){
  const bubble=document.createElement("div");
  bubble.className="bubble";
  bubble.style.background=emotionLevels[note.level].warna;

  const size=100+note.level*15;
  bubble.style.width=size+"px";
  bubble.style.height=size+"px";

  bubble.innerHTML=`
    <div>
      <div style="font-size:11px">${note.date}</div>
      <div style="font-weight:600">${note.judul}</div>
    </div>
  `;

  const obj={
    el:bubble,
    x:Math.random()*(window.innerWidth-size),
    y:Math.random()*(window.innerHeight-size),
    dx:(Math.random()*2+1)*(Math.random()>0.5?1:-1),
    dy:(Math.random()*2+1)*(Math.random()>0.5?1:-1),
    size:size,
    note:note
  };

  bubble.style.left=obj.x+"px";
  bubble.style.top=obj.y+"px";
  bubble.onclick=()=>openDetail(obj);

  document.body.appendChild(bubble);
  bubbles.push(obj);
}

/* Detail */
function openDetail(b){
  document.getElementById("modalContent").innerHTML=`
    <div style="background:${emotionLevels[b.note.level].warna};
                padding:15px;border-radius:12px;color:white">
      <h3>${b.note.judul}</h3>
      <p>${b.note.isi}</p>
      <small>${b.note.date} | ${emotionLevels[b.note.level].nama}</small>
    </div>
    <button onclick="closeModal()">Tutup</button>
  `;
  document.getElementById("modal").style.display="flex";
}

/* 📊 Statistik Bulanan */
function openStats(){
  const notes=loadNotes();
  const now=new Date();
  const month=now.getMonth();
  const year=now.getFullYear();

  const monthly=notes.filter(n=>{
    const d=new Date(n.timestamp);
    return d.getMonth()===month && d.getFullYear()===year;
  });

  const total=monthly.length;
  let counts={1:0,2:0,3:0,4:0};

  monthly.forEach(n=>counts[n.level]++);

  let html=`<h3>Statistik Bulan Ini</h3>`;

  if(total===0){
    html+=`<p>Belum ada catatan bulan ini</p>`;
  }else{
    for(let i=1;i<=4;i++){
      const percent=Math.round((counts[i]/total)*100);
      html+=`
        <p>${emotionLevels[i].nama} (${percent}%)</p>
        <div class="progress">
          <div class="progress-bar"
               style="width:${percent}%;background:${emotionLevels[i].warna}">
            ${percent}%
          </div>
        </div>
      `;
    }
  }

  html+=`<button onclick="closeModal()">Tutup</button>`;
  document.getElementById("modalContent").innerHTML=html;
  document.getElementById("modal").style.display="flex";
}

/* Password */
function activateEdit(){
  const pass=prompt("Masukkan password:");
  if(pass===PASSWORD){
    editMode=true;
    alert("Mode edit aktif");
  }else{
    alert("Password salah");
  }
}

/* Animasi */
function animate(){
  bubbles.forEach(b=>{
    b.x+=b.dx;
    b.y+=b.dy;

    if(b.x<=0||b.x+b.size>=window.innerWidth) b.dx*=-1;
    if(b.y<=0||b.y+b.size>=window.innerHeight) b.dy*=-1;

    b.el.style.left=b.x+"px";
    b.el.style.top=b.y+"px";
  });
  requestAnimationFrame(animate);
}

function refreshBubbles(){
  bubbles.forEach(b=>b.el.remove());
  bubbles=[];
  loadNotes().forEach(n=>createBubble(n));
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function init(){
  refreshBubbles();
  animate();
}

init();
</script>
</body>

</html>
